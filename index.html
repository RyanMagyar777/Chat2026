<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Video Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; padding: 16px; gap: 16px; }
    
    header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 12px 16px; border-radius: 8px; }
    .status { font-size: 14px; font-weight: 500; color: #38bdf8; }
    button { padding: 8px 16px; border-radius: 6px; border: none; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #475569; cursor: not-allowed; }
    
    .main-container { display: flex; flex: 1; gap: 16px; overflow: hidden; }
    .video-section { flex: 2; display: flex; flex-direction: column; gap: 12px; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; background: #020617; border-radius: 8px; padding: 12px; }
    .video-card { display: flex; flex-direction: column; gap: 6px; height: 100%; position: relative; }
    video { width: 100%; flex: 1; object-fit: cover; background: #1e293b; border-radius: 6px; }
    .label { font-size: 12px; color: #94a3b8; }

    .chat-section { flex: 1; display: flex; flex-direction: column; background: #1e293b; border-radius: 8px; padding: 12px; gap: 10px; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
    .msg { padding: 8px 12px; border-radius: 6px; max-width: 80%; font-size: 14px; word-break: break-word; }
    .msg.me { background: #2563eb; align-self: flex-end; }
    .msg.them { background: #334155; align-self: flex-start; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; outline: none; }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <div class="status" id="status-text">Status: Requesting camera...</div>
    <button id="next-btn" disabled>Next Partner ⏭</button>
  </header>

  <div class="main-container">
    <div class="video-section">
      <div class="video-grid">
        <div class="video-card">
          <span class="label">You</span>
          <video id="local-video" autoplay muted playsinline></video>
        </div>
        <div class="video-card">
          <span class="label">Partner</span>
          <video id="remote-video" autoplay playsinline></video>
        </div>
      </div>
    </div>

    <div class="chat-section">
      <h3 style="font-size: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px;">Text Chat</h3>
      <div class="chat-messages" id="messages"></div>
      <div class="chat-input">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { joinRoom, selfId } from 'https://cdn.jsdelivr.net/npm/trystero@0.18.0/nostr.min.js';

    const config = { appId: 'auto-matchmaking-video-chat' };
    const LOBBY_ROOM = 'global-public-lobby';

    let localStream = null;
    let currentRoom = null;
    let lobbyRoom = null;
    let sendMsg = null;

    const statusText = document.getElementById('status-text');
    const nextBtn = document.getElementById('next-btn');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');
    const messagesEl = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');

    async function init() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        nextBtn.disabled = false;
        joinLobby();
      } catch (err) {
        statusText.textContent = 'Status: Camera/Mic access required!';
      }
    }

    function joinLobby() {
      resetMatch();
      statusText.textContent = 'Status: Searching for partner...';

      lobbyRoom = joinRoom(config, LOBBY_ROOM);
      const [sendInvite, getInvite] = lobbyRoom.makeAction('invite');
      
      lobbyRoom.onPeerJoin = (peerId) => {
        if (selfId > peerId) {
          const privateRoomId = `room-${selfId}-${peerId}-${Date.now()}`;
          sendInvite(privateRoomId, peerId);
          connectToPrivateRoom(privateRoomId);
        }
      };

      getInvite((privateRoomId) => {
        connectToPrivateRoom(privateRoomId);
      });
    }

    function connectToPrivateRoom(roomId) {
      if (lobbyRoom) {
        lobbyRoom.leave();
        lobbyRoom = null;
      }

      statusText.textContent = 'Status: Connected!';
      enableChat(true);

      currentRoom = joinRoom(config, roomId);
      currentRoom.addStream(localStream);

      currentRoom.onPeerStream((stream) => {
        remoteVideo.srcObject = stream;
      });

      currentRoom.onPeerLeave = () => {
        statusText.textContent = 'Status: Partner disconnected.';
        remoteVideo.srcObject = null;
        enableChat(false);
      };

      const [sendMessageAction, receiveMessage] = currentRoom.makeAction('chat');
      sendMsg = sendMessageAction;

      receiveMessage((data) => {
        appendMessage(data, 'them');
      });
    }

    function resetMatch() {
      if (currentRoom) {
        currentRoom.leave();
        currentRoom = null;
      }
      remoteVideo.srcObject = null;
      sendMsg = null;
      messagesEl.innerHTML = '';
      enableChat(false);
    }

    function enableChat(enabled) {
      msgInput.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    nextBtn.addEventListener('click', joinLobby);
    sendBtn.addEventListener('click', sendTextMessage);
    msgInput.addEventListener('keypress', (E) => { if (E.key === 'Enter') sendTextMessage(); });

    function sendTextMessage() {
      const text = msgInput.value.trim();
      if (!text || !sendMsg) return;
      sendMsg(text);
      appendMessage(text, 'me');
      msgInput.value = '';
    }

    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.textContent = text;
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    init();
  </script>
</body>
</html>
